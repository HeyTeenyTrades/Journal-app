<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Trading Journal</title>
<meta name="theme-color" content="#0B0F14" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Journal" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" href="icon-192.png" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0B0F14;
    --surface: #121820;
    --surface2: #0E141B;
    --border: #1A2129;
    --border2: #232B34;
    --text: #EDF1F4;
    --muted: #7C8A97;
    --muted2: #5C6975;
    --accent: #E8B049;
    --win: #46C2A6;
    --loss: #F16063;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #060809;
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: calc(18px + env(safe-area-inset-top)) 16px 14px;
    border-bottom: 1px solid var(--border);
  }
  .eyebrow { font-size: 10px; letter-spacing: 1.5px; color: var(--muted2); font-weight: 700; margin-bottom: 4px; }
  .eyebrow-sm { font-size: 10px; letter-spacing: 1px; font-weight: 700; }
  .h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .big-number { font-size: 22px; font-weight: 700; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .ticker-wrap { border-bottom: 1px solid var(--border); overflow: hidden; white-space: nowrap; background: var(--surface2); padding: 8px 0; }
  .ticker-track { display: inline-flex; gap: 22px; padding-left: 16px; animation: ticker-scroll linear infinite; }
  @keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .ticker-chip { display: inline-flex; gap: 6px; font-size: 12px; font-family: ui-monospace, monospace; }
  .body { flex: 1; overflow-y: auto; min-height: 380px; padding: 16px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
  .stat-card .label { display: flex; align-items: center; gap: 6px; color: var(--muted); }
  .stat-value { font-size: 18px; font-weight: 700; font-family: ui-monospace, SFMono-Regular, monospace; }
  .btn-primary {
    width: 100%; background: var(--accent); color: var(--bg); border: none; border-radius: 10px;
    padding: 12px 14px; font-weight: 700; font-size: 14px; display: flex; align-items: center;
    justify-content: center; gap: 8px; cursor: pointer; margin-bottom: 18px;
  }
  .btn-secondary {
    flex: 1; background: transparent; color: var(--muted); border: 1px solid var(--border2);
    border-radius: 10px; padding: 12px 14px; font-weight: 600; font-size: 14px; cursor: pointer;
  }
  .section-label { display:flex; justify-content: space-between; align-items:center; font-size: 11px; letter-spacing: 1px; color: var(--muted2); font-weight: 700; margin-bottom: 10px; }
  .discard-btn { background: transparent; border: none; color: var(--muted); font-size: 11px; text-decoration: underline; cursor: pointer; }
  .entry-row { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
  .entry-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; flex: 1; }
  .symbol-tag { font-size: 13px; font-weight: 700; letter-spacing: 0.3px; }
  .entry-meta { color: var(--muted); font-size: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
  .entry-notes { color: var(--muted2); font-size: 12px; margin-top: 2px; }
  .icon-btn { background: transparent; border: none; color: var(--muted2); cursor: pointer; padding: 6px; display: flex; align-items: center; }
  .empty { color: var(--muted2); font-size: 13px; padding: 24px 4px; text-align: center; border: 1px dashed var(--border2); border-radius: 12px; }
  .field { margin-bottom: 12px; }
  .field-label { font-size: 11px; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  input, select, textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px;
    padding: 10px 12px; color: var(--text); font-size: 14px; font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .pnl-row { display: flex; gap: 8px; align-items: stretch; }
  .pnl-toggle { display: flex; border: 1px solid var(--border2); border-radius: 8px; overflow: hidden; flex-shrink: 0; }
  .pnl-toggle-btn { background: var(--surface); color: var(--muted); border: none; padding: 10px 14px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .pnl-toggle-btn.win.active { background: rgba(70,194,166,0.18); color: var(--win); }
  .pnl-toggle-btn.loss.active { background: rgba(241,96,99,0.18); color: var(--loss); }
  .error-text { color: var(--loss); font-size: 12px; margin-top: 4px; }
  .tag-chip { font-size: 10px; color: var(--accent); background: rgba(232,176,73,0.12); border: 1px solid rgba(232,176,73,0.3); border-radius: 20px; padding: 2px 8px; font-weight: 600; }
  .tag-input-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 10px; }
  .tag-chip-editable { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--accent); background: rgba(232,176,73,0.12); border: 1px solid rgba(232,176,73,0.3); border-radius: 20px; padding: 3px 6px 3px 10px; font-weight: 600; }
  .tag-chip-remove { background: transparent; border: none; color: var(--accent); cursor: pointer; display: flex; padding: 2px; }
  .tag-raw-input { flex: 1; min-width: 90px; background: transparent !important; border: none !important; color: var(--text); font-size: 14px; padding: 4px 2px; outline: none; }
  .hint-text { font-size: 11px; color: var(--muted2); margin-top: 4px; }
  .upload-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: var(--surface); border: 1px dashed #2E3A45; border-radius: 10px; padding: 14px 12px; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; }
  .image-preview-wrap { position: relative; border-radius: 10px; overflow: hidden; border: 1px solid var(--border2); }
  .image-preview { width: 100%; max-height: 220px; object-fit: cover; display: block; }
  .remove-image-btn { position: absolute; top: 8px; right: 8px; background: rgba(11,15,20,0.85); border: 1px solid var(--border2); border-radius: 50%; color: var(--text); width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .thumb-btn { background: transparent; border: 1px solid var(--border2); border-radius: 8px; padding: 0; cursor: pointer; flex-shrink: 0; width: 44px; height: 44px; overflow: hidden; }
  .thumb-img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .week-row { display: grid; grid-template-columns: repeat(7, 1fr) 46px; margin-bottom: 6px; }
  .week-day { text-align: center; font-size: 10px; color: var(--muted2); font-weight: 700; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr) 46px; gap: 3px; }
  .cal-week { margin-bottom: 6px; }
  .cal-cell-pl {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 9px;
    font-weight: 700;
    font-family: ui-monospace, monospace;
    background: #1A2129;
    border: 1px solid var(--border);
    min-height: 0;
    line-height: 1.2;
    padding: 0 2px;
    color: #5C6975;
  }
  .cal-cell-pl.win {
    background: rgba(70,194,166,0.85);
    border-color: #46C2A6;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .cal-cell-pl.loss {
    background: rgba(241,96,99,0.85);
    border-color: #F16063;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .cal-cell { aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; background: transparent; border: 1px solid transparent; cursor: default; overflow: hidden; min-height: 44px; }
  .cal-cell.has { cursor: pointer; }
  .cal-cell .d { font-size: 12px; color: var(--muted); }
  .cal-cell .amt { font-size: 10px; font-family: ui-monospace, monospace; font-weight: 700; }
  .nav-bar { display: flex; justify-content: space-around; border-top: 1px solid var(--border); padding: 8px 4px calc(12px + env(safe-area-inset-bottom)); background: var(--surface2); }
  .nav-item { background: transparent; border: none; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 6px 10px; color: var(--muted); }
  .nav-item.active { color: var(--accent); }
  .toast { position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%); background: #1A2129; border: 1px solid var(--accent); color: var(--text); padding: 8px 14px; border-radius: 20px; font-size: 12px; z-index: 60; }
  .lightbox-overlay { position: fixed; inset: 0; background: rgba(6,8,11,0.92); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
  .lightbox-img { max-width: 100%; max-height: 100%; border-radius: 8px; border: 1px solid var(--border2); }
  .lightbox-close { position: absolute; top: 18px; right: 18px; background: var(--surface); border: 1px solid var(--border2); border-radius: 50%; width: 36px; height: 36px; color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .icon-row-actions { display: flex; gap: 8px; }
  .tiny-btn { background: transparent; border: 1px solid var(--border2); color: var(--muted); font-size: 11px; padding: 6px 10px; border-radius: 8px; cursor: pointer; }
  .sync-btn { background: transparent; border: 1px solid var(--border2); border-radius: 20px; color: var(--muted); font-size: 10px; padding: 4px 10px; display: flex; align-items: center; gap: 5px; cursor: pointer; margin-top: 6px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted2); flex-shrink: 0; }
  .sync-dot.on { background: var(--win); }
  .sync-dot.off { background: var(--loss); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(6,8,11,0.85); display: flex; align-items: flex-end; justify-content: center; z-index: 55; }
  .modal-sheet { width: 100%; max-width: 480px; background: var(--bg); border-top: 1px solid var(--border2); border-radius: 18px 18px 0 0; padding: 18px 16px calc(20px + env(safe-area-inset-bottom)); max-height: 85vh; overflow-y: auto; }
  .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
  .code-box { display: flex; gap: 8px; align-items: center; }
  .code-box input { font-family: ui-monospace, monospace; letter-spacing: 0.5px; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: #2A333D; border-radius: 4px; }
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="importFile" accept="application/json" style="display:none" />

<script>
(function () {
  "use strict";

  // ---------- storage ----------
  const LS_ENTRIES = "tj_entries";
  const LS_DRAFT = "tj_draft";
  const DIRECTIONS = ["Long", "Short"];
  const SESSIONS = ["Asia", "London", "NY AM", "NY PM"];
  const SYMBOLS = ["XAUUSD", "MGC", "MNQ"];

  const uid = () => Date.now() + "-" + Math.random().toString(36).slice(2, 8);
  const todayStr = () => new Date().toISOString().slice(0, 10);
  const fmtMoney = (n) => {
    const v = Number(n) || 0;
    const sign = v > 0 ? "+" : v < 0 ? "-" : "";
    return sign + "$" + Math.abs(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  };
  const monthLabel = (d) => d.toLocaleDateString(undefined, { month: "long", year: "numeric" });
  const escapeHtml = (s) => (s || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  function loadEntries() {
    try {
      const raw = localStorage.getItem(LS_ENTRIES);
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  }
  function saveEntries(entries) {
    try {
      localStorage.setItem(LS_ENTRIES, JSON.stringify(entries));
      return true;
    } catch (e) { return false; }
  }
  function emptyDraft() {
    return { symbol: "", symbolOther: false, date: todayStr(), time: "", direction: "Long", session: "London",
      entryPrice: "", exitPrice: "", pnl: "", pnlSign: "win", rr: "", notes: "", tags: [], tagDraft: "", image: null };
  }
  function loadDraft() {
    try {
      const raw = localStorage.getItem(LS_DRAFT);
      return raw ? Object.assign(emptyDraft(), JSON.parse(raw)) : emptyDraft();
    } catch (e) { return emptyDraft(); }
  }
  function saveDraft(d) {
    try { localStorage.setItem(LS_DRAFT, JSON.stringify(d)); } catch (e) {}
  }

  // ---------- sync config ----------
  const LS_SYNC = "tj_sync";
  function loadSyncConfig() {
    try {
      const raw = localStorage.getItem(LS_SYNC);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }
  function saveSyncConfig(cfg) {
    try { localStorage.setItem(LS_SYNC, JSON.stringify(cfg)); } catch (e) {}
  }
  function clearSyncConfig() {
    try { localStorage.removeItem(LS_SYNC); } catch (e) {}
  }
  function genSyncCode() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID().replace(/-/g, "").slice(0, 20);
    return Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
  }
  function rowToEntry(row) {
    return { id: row.id, symbol: row.symbol, date: row.date, time: row.time, direction: row.direction,
      session: row.session, entryPrice: row.entry_price, exitPrice: row.exit_price, pnl: row.pnl,
      rr: row.rr, notes: row.notes, tags: row.tags || [], image: row.image };
  }
  function entryToRow(e, syncCode) {
    return { id: e.id, journal_key: syncCode, symbol: e.symbol, date: e.date, time: e.time,
      direction: e.direction, session: e.session, entry_price: e.entryPrice, exit_price: e.exitPrice,
      pnl: e.pnl, rr: e.rr, notes: e.notes, tags: e.tags || [], image: e.image };
  }

  // ---------- state ----------
  let state = {
    entries: loadEntries(),
    view: "dashboard",
    draft: loadDraft(),
    calYear: new Date().getFullYear(),
    calMonth: new Date().getMonth(),
    selectedDay: null,
    lightbox: null,
    formError: "",
    imageBusy: false,
    sync: loadSyncConfig(),          // { url, anonKey, syncCode } or null
    syncStatus: "off",               // "off" | "connecting" | "on" | "error"
    showSyncModal: false,
    syncDraft: { url: "", anonKey: "", syncCode: "" },
    syncError: "",
  };

  let supaClient = null;
  let realtimeChannel = null;

  function setState(patch) {
    Object.assign(state, patch);
    render();
  }

  // ---------- icons (tiny inline svg) ----------
  const ICON = {
    trendUp: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>',
    trendDown: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></svg>',
    calendar: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>',
    plus: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>',
    list: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>',
    trash: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>',
    left: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>',
    right: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>',
    target: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>',
    gauge: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"></path><path d="M19.07 4.93A10 10 0 0 0 3.34 17.5"></path><path d="M20.66 17.5A10 10 0 0 0 12 2"></path></svg>',
    image: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>',
    x: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>',
    cloud: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></svg>',
    copy: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>',
  };

  // ---------- derived ----------
  function computeStats(entries) {
    const total = entries.reduce((s, e) => s + (Number(e.pnl) || 0), 0);
    const wins = entries.filter((e) => Number(e.pnl) > 0).length;
    const losses = entries.filter((e) => Number(e.pnl) < 0).length;
    const decisive = wins + losses;
    const winRate = decisive ? (wins / decisive) * 100 : 0;
    const avgWin = wins ? entries.filter((e) => Number(e.pnl) > 0).reduce((s, e) => s + Number(e.pnl), 0) / wins : 0;
    const avgLoss = losses ? entries.filter((e) => Number(e.pnl) < 0).reduce((s, e) => s + Number(e.pnl), 0) / losses : 0;
    const rrValues = entries.map((e) => parseFloat(e.rr)).filter((n) => !isNaN(n));
    const avgRR = rrValues.length ? rrValues.reduce((a, b) => a + b, 0) / rrValues.length : 0;
    return { total, wins, losses, winRate, avgWin, avgLoss, avgRR, count: entries.length };
  }
  function groupByDay(entries) {
    const map = {};
    entries.forEach((e) => {
      if (!e.date) return;
      (map[e.date] = map[e.date] || []).push(e);
    });
    return map;
  }

  // ---------- render pieces ----------
  function renderEntryRow(e, opts) {
    opts = opts || {};
    const up = Number(e.pnl) >= 0;
    const tags = e.tags || [];
    return (
      '<div class="entry-row">' +
        (e.image ? '<button class="thumb-btn" data-action="view-image" data-src-idx="' + e.id + '"><img class="thumb-img" src="' + e.image + '" alt="screenshot"></button>' : '') +
        '<div class="entry-info">' +
          '<div style="display:flex;gap:8px;align-items:center;">' +
            '<span class="symbol-tag">' + escapeHtml((e.symbol || "—").toUpperCase()) + '</span>' +

  function renderCalendar() {
    const year = state.calYear, m = state.calMonth;
    const byDay = groupByDay(state.entries);
    const firstDay = new Date(year, m, 1);
    const startWeekday = firstDay.getDay();
    const daysInMonth = new Date(year, m + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < startWeekday; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) cells.push(d);
    const dateKey = (d) => year + "-" + String(m + 1).padStart(2, "0") + "-" + String(d).padStart(2, "0");
    let monthTotal = 0;
    Object.keys(byDay).forEach((k) => {
      const [ky, km] = k.split("-").map(Number);
      if (ky === year && km === m + 1) monthTotal += byDay[k].reduce((s, e) => s + Number(e.pnl || 0), 0);
    });
    const monthName = new Date(year, m, 1).toLocaleDateString(undefined, { month: "long", year: "numeric" });

    function renderCell(d) {
      if (d === null) return '<div></div>';
      const key = dateKey(d);
      const list = byDay[key] || [];
      const total = list.reduce((s, e) => s + Number(e.pnl || 0), 0);
      const has = list.length > 0;
      const up = total > 0;
      const isToday = key === todayStr();
      const bg = has ? (up ? "rgba(70,194,166,0.14)" : "rgba(241,96,99,0.14)") : "transparent";
      const border = isToday ? "1px solid var(--accent)" : has ? "1px solid " + (up ? "#2E6A5C" : "#6A3234") : "1px solid transparent";
      return (
        '<button class="cal-cell' + (has ? " has" : "") + '" style="background:' + bg + ';border:' + border + ';" ' + (has ? 'data-action="select-day" data-day="' + key + '"' : "") + '>' +
          '<span class="d">' + d + '</span>' +
          (has ? '<span class="amt" style="color:' + (up ? "var(--win)" : "var(--loss)") + '">' + (up ? "+" : "-") + "$" + (Math.abs(total) >= 1000 ? (Math.abs(total) / 1000).toFixed(1) + "k" : Math.abs(total).toFixed(0)) + '</span>' : "") +
        '</button>'
      );
    }

    let weeksHtml = "";
    for (let i = 0; i < cells.length; i += 7) {
      const weekCells = cells.slice(i, i + 7);
      // Pad to exactly 7 cells so the P&L always stays in the 8th grid column
      while (weekCells.length < 7) weekCells.push(null);
      let weekTotal = 0;
      let weekHas = false;
      weekCells.forEach((d) => {
        if (d === null) return;
        const list = byDay[dateKey(d)] || [];
        if (list.length) weekHas = true;
        weekTotal += list.reduce((s, e) => s + Number(e.pnl || 0), 0);
      });
      const cellsHtml = weekCells.map(renderCell).join("");
      const pnlClass = weekTotal >= 0 ? "win" : "loss";
      const pnlCell = weekHas
        ? '<div class="cal-cell-pl ' + pnlClass + '">' + fmtMoney(weekTotal) + '</div>'
        : '<div class="cal-cell-pl">—</div>';
      weeksHtml +=
        '<div class="cal-week">' +
          '<div class="cal-grid">' + cellsHtml + pnlCell + '</div>' +
        '</div>';
    }

    let drilldown = "";
    if (state.selectedDay && byDay[state.selectedDay]) {
      drilldown = '<div style="margin-top:18px;"><div class="section-label"><span>' + state.selectedDay + '</span></div>' +
        byDay[state.selectedDay].map((e) => renderEntryRow(e, { compact: true, noDelete: true })).join("") +
      '</div>';
    }

    return (
      '<div class="cal-header">' +
        '<button class="icon-btn" data-action="cal-prev">' + ICON.left + '</button>' +
        '<div style="text-align:center;"><div class="eyebrow-sm">' + monthName.toUpperCase() + '</div>' +
        '<div style="color:' + (monthTotal >= 0 ? "var(--win)" : "var(--loss)") + ';font-weight:700;font-family:ui-monospace,monospace;">' + fmtMoney(monthTotal) + '</div></div>' +
        '<button class="icon-btn" data-action="cal-next">' + ICON.right + '</button>' +
      '</div>' +
      '<div class="week-row">' + ["S", "M", "T", "W", "T", "F", "S", "W PNL"].map((d) => '<div class="week-day">' + d + '</div>').join("") + '</div>' +
      weeksHtml +
      drilldown
    );
  }

  function renderNav() {
    const items = [
      { key: "dashboard", label: "Dashboard", icon: ICON.trendUp },
      { key: "new", label: "New", icon: ICON.plus },
      { key: "calendar", label: "Calendar", icon: ICON.calendar },

  function render() {
    const stats = computeStats(state.entries);
    let bodyHtml;
    if (state.view === "dashboard") bodyHtml = renderDashboard();
    else if (state.view === "new") bodyHtml = renderNewEntry();
    else if (state.view === "calendar") bodyHtml = renderCalendar();
    else bodyHtml = renderHistory();

    document.getElementById("app").innerHTML =
      renderHeader(stats) +
      renderTicker(state.entries) +
      '<div class="body">' + bodyHtml + '</div>' +
      renderNav() +
      (state.toast ? '<div class="toast">' + escapeHtml(state.toast) + '</div>' : "") +
      (state.lightbox ? '<div class="lightbox-overlay" data-action="close-lightbox"><button class="lightbox-close" data-action="close-lightbox">' + ICON.x + '</button><img class="lightbox-img" src="' + state.lightbox + '"></div>' : "") +
      renderSyncModal();

    wireFormEvents();
    wireSyncModalEvents();
  }

  function wireSyncModalEvents() {
    if (!state.showSyncModal) return;
    const map = { "sy-url": "url", "sy-key": "anonKey", "sy-code": "syncCode" };
    Object.keys(map).forEach((id) => {
      const el = document.getElementById(id);
      if (!el) return;
      const key = map[id];
      el.addEventListener("input", () => { state.syncDraft[key] = el.value; });
      if (document.activeElement && document.activeElement.id === id) {
        el.focus();
        const val = el.value;
        el.value = val;
        try { el.setSelectionRange(val.length, val.length); } catch (e) {}
      }
    });
  }

  // ---------- form field wiring (since we re-render via innerHTML) ----------
  function wireFormEvents() {
    if (state.view !== "new") return;
    const map = { "f-date": "date", "f-time": "time", "f-direction": "direction",
      "f-session": "session", "f-entryPrice": "entryPrice", "f-exitPrice": "exitPrice", "f-pnl": "pnl",
      "f-rr": "rr", "f-notes": "notes", "f-tagDraft": "tagDraft" };
    Object.keys(map).forEach((id) => {
      const el = document.getElementById(id);
      if (!el) return;
      const key = map[id];
      const evt = (el.tagName === "SELECT") ? "change" : "input";
      el.addEventListener(evt, () => {
        state.draft[key] = key === "pnl" ? el.value.replace(/-/g, "") : el.value;
        saveDraft(state.draft);
        // avoid full re-render for text inputs to keep cursor position / focus
        if (key === "tagDraft") return;
      });
      // keep focus after re-render for the actively focused field
      if (document.activeElement && document.activeElement.id === id) {
        el.focus();
        const val = el.value;
        el.value = val;
        try { el.setSelectionRange(val.length, val.length); } catch (e) {}
      }
    });

    const tagInput = document.getElementById("f-tagDraft");
    if (tagInput) {
      tagInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === ",") {
          e.preventDefault();
          addTagFromDraft();
        } else if (e.key === "Backspace" && !tagInput.value && state.draft.tags.length) {
          state.draft.tags.pop();
          saveDraft(state.draft);
          render();
        }
      });
      tagInput.addEventListener("blur", addTagFromDraft);
    }

    const imageInput = document.getElementById("f-image");
    if (imageInput) {
      imageInput.addEventListener("change", handleImageFile);
    }

    // Handle symbol select dropdown
    const symSelect = document.getElementById("f-symbol-select");
    if (symSelect) {
      symSelect.addEventListener("change", () => {
        const val = symSelect.value;
        if (val === "__other__") {
          state.draft.symbolOther = true;
          state.draft.symbol = "";
        } else {
          state.draft.symbolOther = false;
          state.draft.symbol = val;
        }
        saveDraft(state.draft);
        render();
      });
    }

    // Handle symbol custom text input
    const symCustom = document.getElementById("f-symbol-custom");
    if (symCustom) {
      symCustom.addEventListener("input", () => {
        state.draft.symbol = symCustom.value;
        saveDraft(state.draft);
      });
      if (document.activeElement && document.activeElement.id === "f-symbol-custom") {
        symCustom.focus();
        const val = symCustom.value;
        try { symCustom.setSelectionRange(val.length, val.length); } catch (e) {}
      }
    }
  }

  function addTagFromDraft() {
    const t = (state.draft.tagDraft || "").trim().replace(/,$/, "");
    if (t && !state.draft.tags.includes(t)) state.draft.tags.push(t);
    state.draft.tagDraft = "";
    saveDraft(state.draft);
    render();
  }

  function handleImageFile(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    if (!file.type.startsWith("image/")) {
      setState({ formError: "That file isn't an image." });
      return;
    }
    state.imageBusy = true;
    render();
    compressImage(file, 640, 0.6).then((dataUrl) => {
      state.draft.image = dataUrl;
      state.imageBusy = false;
      state.formError = "";
      saveDraft(state.draft);
      render();
    }).catch(() => {
      state.imageBusy = false;
      setState({ formError: "Couldn't process that screenshot — try a different file." });
    });
  }

  function compressImage(file, maxWidth, quality) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error("read failed"));
      reader.onload = () => {
        const img = new Image();
        img.onerror = () => reject(new Error("image failed"));
        img.onload = () => {
          const scale = Math.min(1, maxWidth / img.width);
          const w = Math.max(1, Math.round(img.width * scale));
          const h = Math.max(1, Math.round(img.height * scale));
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // ---------- actions ----------
  function connectSync(cfg, opts) {
    opts = opts || {};
    if (!cfg || !cfg.url || !cfg.anonKey || !cfg.syncCode) return;
    if (typeof supabase === "undefined" || !supabase.createClient) {
      setState({ syncStatus: "error", syncError: "Sync library failed to load — check your internet connection and reload." });
      return;
    }
    try {
      supaClient = supabase.createClient(cfg.url, cfg.anonKey);
    } catch (e) {
      setState({ syncStatus: "error", syncError: "Couldn't connect — check the URL and key." });
      return;
    }
    state.sync = cfg;
    saveSyncConfig(cfg);
    state.syncStatus = "connecting";
    if (!opts.silent) render();

    pullRemote()
      .then(() => {
        state.syncStatus = "on";
        state.syncError = "";
        subscribeRealtime();
        render();
      })
      .catch((err) => {
        state.syncStatus = "error";
        state.syncError = "Couldn't reach Supabase. Check the table was created and the URL/key are correct.";
        render();
      });
  }

  function disconnectSync() {
    if (realtimeChannel) {
      try { supaClient.removeChannel(realtimeChannel); } catch (e) {}
      realtimeChannel = null;
    }
    supaClient = null;
    clearSyncConfig();
    setState({ sync: null, syncStatus: "off", showSyncModal: false, syncDraft: { url: "", anonKey: "", syncCode: "" } });
  }

  function pullRemote() {
    if (!supaClient || !state.sync) return Promise.reject(new Error("not connected"));
    return supaClient
      .from("entries")
      .select("*")
      .eq("journal_key", state.sync.syncCode)
      .order("created_at", { ascending: false })
      .then(({ data, error }) => {
        if (error) throw error;
        state.entries = (data || []).map(rowToEntry);
        saveEntries(state.entries);
      });
  }

  function pushEntryRemote(entry) {
    if (!supaClient || !state.sync || state.syncStatus !== "on") return;
    supaClient
      .from("entries")
      .upsert(entryToRow(entry, state.sync.syncCode))
      .then(({ error }) => {
        if (error) showToast("Saved locally — sync failed");
      });
  }

  function deleteEntryRemote(id) {
    if (!supaClient || !state.sync || state.syncStatus !== "on") return;
    supaClient
      .from("entries")
      .delete()
      .eq("id", id)
      .eq("journal_key", state.sync.syncCode)
      .then(({ error }) => {
        if (error) showToast("Deleted locally — sync failed");
      });
  }

  function subscribeRealtime() {
    if (!supaClient || !state.sync) return;
    if (realtimeChannel) {
      try { supaClient.removeChannel(realtimeChannel); } catch (e) {}
    }
    realtimeChannel = supaClient
      .channel("entries-" + state.sync.syncCode)
      .on(
        "postgres_changes",
        { event: "*", schema: "public", table: "entries", filter: "journal_key=eq." + state.sync.syncCode },
        () => {
          // Any change from either device — just re-pull for simplicity/correctness.
          pullRemote().then(render).catch(() => {});
        }
      )
      .subscribe();
  }

  function saveEntryFromDraft() {
    const d = state.draft;
    if (!d.symbol.trim()) return setState({ formError: "Add a symbol, like EURUSD." });
    if (!d.date) return setState({ formError: "Pick a date." });
    if (d.pnl === "" || isNaN(Number(d.pnl))) return setState({ formError: "Enter a P&L amount." });

    const magnitude = Math.abs(Number(d.pnl));
    const signedPnl = d.pnlSign === "loss" ? -magnitude : magnitude;

    const entry = {
      id: uid(),
      symbol: d.symbol.trim(), date: d.date, time: d.time, direction: d.direction, session: d.session,
      entryPrice: d.entryPrice, exitPrice: d.exitPrice, pnl: signedPnl, rr: d.rr,
      notes: d.notes.trim(), tags: d.tags.slice(), image: d.image,
    };
    state.entries = [entry].concat(state.entries);
    saveEntries(state.entries);
    state.draft = emptyDraft();
    saveDraft(state.draft);
    state.formError = "";
    state.view = "dashboard";
    showToast("Trade logged");
    render();
    pushEntryRemote(entry);
  }

  let toastTimer;
  function showToast(msg) {
    state.toast = msg;
    render();
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { state.toast = null; render(); }, 2000);
  }

  function deleteEntry(id) {
    state.entries = state.entries.filter((e) => e.id !== id);
    saveEntries(state.entries);
    render();
    deleteEntryRemote(id);
  }

  function exportJson() {
    const blob = new Blob([JSON.stringify(state.entries, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "trading-journal-" + todayStr() + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function importJson(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const incoming = JSON.parse(reader.result);
        if (!Array.isArray(incoming)) throw new Error("bad format");
        const existingIds = new Set(state.entries.map((e) => e.id));
        const newOnes = incoming.filter((e) => e && e.id && !existingIds.has(e.id));
        const merged = state.entries.concat(newOnes);
        state.entries = merged;
        saveEntries(state.entries);
        showToast("Imported " + incoming.length + " entries");
        render();
        if (state.syncStatus === "on") newOnes.forEach(pushEntryRemote);
      } catch (e) {
        showToast("Couldn't read that file");
      }
    };
    reader.readAsText(file);
  }

  // ---------- event delegation ----------
  document.getElementById("app").addEventListener("click", (e) => {
    const target = e.target.closest("[data-action]");
    if (!target) return;
    const action = target.getAttribute("data-action");
    switch (action) {
      case "go-dashboard": setState({ view: "dashboard", formError: "" }); break;
      case "go-new": setState({ view: "new", formError: "" }); break;
      case "go-calendar": setState({ view: "calendar" }); break;
      case "go-history": setState({ view: "history" }); break;
      case "save-entry": saveEntryFromDraft(); break;
      case "discard-draft":
        state.draft = emptyDraft();
        saveDraft(state.draft);
        render();
        break;
      case "delete-entry": deleteEntry(target.getAttribute("data-id")); break;
      case "remove-tag":
        state.draft.tags = state.draft.tags.filter((t) => t !== target.getAttribute("data-tag"));
        saveDraft(state.draft);
        render();
        break;
      case "remove-image":
        state.draft.image = null;
        saveDraft(state.draft);
        render();
        break;
      case "cal-prev": {
        let m = state.calMonth - 1, y = state.calYear;
        if (m < 0) { m = 11; y -= 1; }
        setState({ calMonth: m, calYear: y, selectedDay: null });
        break;
      }
      case "cal-next": {
        let m = state.calMonth + 1, y = state.calYear;
        if (m > 11) { m = 0; y += 1; }
        setState({ calMonth: m, calYear: y, selectedDay: null });
        break;
      }
      case "select-day": {
        const day = target.getAttribute("data-day");
        setState({ selectedDay: state.selectedDay === day ? null : day });
        break;
      }
      case "view-image": {
        const row = target.closest(".entry-row");
        const img = row && row.querySelector(".thumb-img");
        if (img) setState({ lightbox: img.src });
        break;
      }
      case "close-lightbox": setState({ lightbox: null }); break;
      case "export-json": exportJson(); break;
      case "import-json": document.getElementById("importFile").click(); break;
      case "open-sync-modal":
        setState({
          showSyncModal: true,
          syncDraft: state.sync ? Object.assign({}, state.sync) : { url: "", anonKey: "", syncCode: "" },
          syncError: "",
        });
        break;
      case "close-sync-modal":
      case "close-sync-modal-backdrop":
        setState({ showSyncModal: false, syncError: "" });
        break;
      case "noop-sync-sheet":
        break;
      case "gen-sync-code":
        state.syncDraft.syncCode = genSyncCode();
        render();
        break;
      case "set-pnl-sign":
        state.draft.pnlSign = target.getAttribute("data-sign");
        saveDraft(state.draft);
        render();
        break;
      case "copy-sync-code":
        if (navigator.clipboard) {
          navigator.clipboard.writeText(state.syncDraft.syncCode).then(() => showToast("Code copied"));
        }
        break;
      case "save-sync": {
        const cfg = {
          url: (state.syncDraft.url || "").trim().replace(/\/+$/, ""),
          anonKey: (state.syncDraft.anonKey || "").trim(),
          syncCode: (state.syncDraft.syncCode || "").trim(),
        };
        if (!cfg.url || !cfg.anonKey || !cfg.syncCode) {
          setState({ syncError: "Fill in the URL, key, and sync code." });
          break;
        }
        setState({ showSyncModal: false, syncError: "" });
        connectSync(cfg);
        break;
      }
      case "disconnect-sync": disconnectSync(); break;
    }
  });

  document.getElementById("importFile").addEventListener("change", (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (file) importJson(file);
  });

  // ---------- service worker ----------
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }

  render();

  if (state.sync) {
    connectSync(state.sync, { silent: true });
  }
})();
</script>
</body>
</html>
